<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Scraper - Extract Company Data</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 120px;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-group input[type="text"] {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .input-group input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-group input[type="number"] {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-scrape {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-scrape:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-scrape:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-download {
            background: #4CAF50;
            color: white;
            display: none;
        }

        .btn-download:hover {
            background: #45a049;
        }

        .status {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
        }

        .status.success {
            background: #f1f8f4;
            color: #2e7d32;
            border-left: 4px solid #4CAF50;
            display: block;
        }

        .status.error {
            background: #fef5f5;
            color: #c62828;
            border-left: 4px solid #f44336;
            display: block;
        }

        .status.loading {
            background: #f3f6ff;
            color: #1976d2;
            border-left: 4px solid #667eea;
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(25, 118, 210, 0.2);
            border-top-color: #1976d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results-container {
            margin-top: 30px;
            display: none;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .results-header h2 {
            color: #333;
            font-size: 18px;
        }

        .results-count {
            color: #666;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background: #f5f5f5;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover {
            background: #fafafa;
        }

        td a {
            color: #667eea;
            text-decoration: none;
            word-break: break-all;
        }

        td a:hover {
            text-decoration: underline;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 13px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Web Scraper</h1>
        <p class="subtitle">Paste a URL and extract company names and links</p>

        <div class="input-group">
            <div class="input-wrapper">
                <label class="label">Website URL</label>
                <input type="text" id="urlInput" placeholder="https://example.com/exhibitors">
            </div>
            <div class="input-wrapper">
                <label class="label">Max Pages</label>
                <input type="number" id="maxPages" value="20" min="1" max="100">
            </div>
        </div>

        <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="useBrowser" style="width: 16px; height: 16px; cursor: pointer;">
            <label for="useBrowser" style="margin: 0; cursor: pointer; font-size: 14px; color: #666;">
                🌐 Use Browser (slower but works with JavaScript sites)
            </label>
        </div>

        <div class="button-group">
            <button class="btn-scrape" id="scrapeBtn" onclick="scrapeWebsite()">Scrape</button>
            <button class="btn-download" id="downloadBtn" onclick="downloadCSV()">📥 Download CSV</button>
        </div>

        <div class="status" id="status"></div>

        <div class="results-container" id="resultsContainer">
            <div class="results-header">
                <h2>Results</h2>
                <span class="results-count"><strong id="resultCount">0</strong> companies found</span>
            </div>

            <div style="margin-bottom: 20px; display: grid; grid-template-columns: 1fr 150px 100px; gap: 10px; align-items: flex-end;">
                <div>
                    <label class="label">Filter by Company Name</label>
                    <input type="text" id="filterInput" placeholder="Type to filter..." style="width: 100%; padding: 8px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px;">
                </div>
                <div>
                    <label class="label">Filter Type</label>
                    <select id="filterType" style="width: 100%; padding: 8px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px;">
                        <option value="name">Company Name</option>
                        <option value="url">URL</option>
                    </select>
                </div>
                <button onclick="resetFilter()" style="padding: 8px 16px; background: #999; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">Reset</button>
            </div>

            <div class="table-wrapper">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Company Name</th>
                            <th>URL</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function scrapeWebsite() {
            const url = document.getElementById('urlInput').value.trim();
            const maxPages = document.getElementById('maxPages').value;
            const useBrowser = document.getElementById('useBrowser').checked;
            const scrapeBtn = document.getElementById('scrapeBtn');
            const status = document.getElementById('status');

            if (!url) {
                showStatus('error', '❌ Please enter a URL');
                return;
            }

            // Show loading status
            const mode = useBrowser ? '🌐 Browser mode' : '⚡ Fast mode';
            showStatus('loading', '<span class="spinner"></span>Scraping... This may take a moment (' + mode + ')');
            scrapeBtn.disabled = true;
            document.getElementById('resultsContainer').style.display = 'none';

            try {
                const response = await fetch('/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, max_pages: maxPages, use_browser: useBrowser })
                });

                const data = await response.json();

                if (data.error) {
                    showStatus('error', `❌ ${data.error}`);
                    scrapeBtn.disabled = false;
                    return;
                }

                // Display results
                displayResults(data.results, data.method);
                showStatus('success', `✓ Found ${data.count} companies using <strong>${data.method}</strong>`);
                document.getElementById('downloadBtn').style.display = 'inline-block';

            } catch (error) {
                showStatus('error', `❌ Error: ${error.message}`);
            } finally {
                scrapeBtn.disabled = false;
            }
        }

        let allResults = [];  // Store all results for filtering

        function displayResults(results, method) {
            allResults = results;  // Store for filtering
            const tbody = document.getElementById('resultsBody');
            const container = document.getElementById('resultsContainer');
            const countElement = document.getElementById('resultCount');

            tbody.innerHTML = '';
            countElement.textContent = results.length;

            if (results.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="no-results">No results to display</td></tr>';
            } else {
                results.forEach(result => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${escapeHtml(result.name)}</strong></td>
                        <td><a href="${escapeHtml(result.url)}" target="_blank">${escapeHtml(result.url)}</a></td>
                    `;
                    tbody.appendChild(row);
                });
            }

            container.style.display = 'block';
            setupFilterListeners();
        }

        function setupFilterListeners() {
            const filterInput = document.getElementById('filterInput');
            filterInput.addEventListener('input', (e) => {
                const filterValue = e.target.value.trim().toLowerCase();
                if (filterValue === '') {
                    displayResults(allResults, '');
                } else {
                    applyFilter();
                }
            });
        }

        async function applyFilter() {
            const filterInput = document.getElementById('filterInput').value.trim();
            const filterType = document.getElementById('filterType').value;

            if (!filterInput) {
                displayResults(allResults, '');
                return;
            }

            try {
                const response = await fetch('/filter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: filterType, value: filterInput })
                });

                const data = await response.json();
                if (data.results) {
                    displayFilteredResults(data.results, data.count, data.original_count);
                }
            } catch (error) {
                console.error('Filter error:', error);
            }
        }

        function displayFilteredResults(results, count, total) {
            const tbody = document.getElementById('resultsBody');
            const countElement = document.getElementById('resultCount');

            tbody.innerHTML = '';
            countElement.textContent = `${count}/${total}`;

            if (results.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="no-results">No matches found</td></tr>';
            } else {
                results.forEach(result => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${escapeHtml(result.name)}</strong></td>
                        <td><a href="${escapeHtml(result.url)}" target="_blank">${escapeHtml(result.url)}</a></td>
                    `;
                    tbody.appendChild(row);
                });
            }
        }

        function resetFilter() {
            document.getElementById('filterInput').value = '';
            displayResults(allResults, '');
        }

        function downloadCSV() {
            const link = document.createElement('a');
            link.href = '/download';
            link.click();
        }

        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.className = `status ${type}`;
            status.innerHTML = message;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key to scrape
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') scrapeWebsite();
        });
    </script>
</body>
</html>
